basePath: /api/v2
definitions:
  internal_reservation.OrderResp:
    properties:
      alumni_association:
        example: 土木与交通工程学院校友会
        type: string
      applicant_name:
        example: 张三
        type: string
      created_at:
        example: 2026-01-01 08:30
        type: string
      id:
        example: 1
        type: integer
      major:
        example: 建筑系
        type: string
      order_no:
        example: R202601010900001234
        type: string
      phone:
        example: "13800138000"
        type: string
      reason:
        example: 智慧城市讲座
        type: string
      slots:
        description: 时段明细列表
        items:
          $ref: '#/definitions/internal_reservation.SlotResp'
        type: array
      status:
        example: 0
        type: integer
      status_text:
        example: 待审核
        type: string
      total_slots:
        example: 2
        type: integer
      year:
        example: 2000
        type: integer
    type: object
  internal_reservation.Response:
    properties:
      code:
        example: 200
        type: integer
      data: {}
      msg:
        example: success
        type: string
    type: object
  internal_reservation.SlotResp:
    properties:
      end_time:
        example: 2026-01-01 10:00
        type: string
      id:
        example: 1
        type: integer
      start_time:
        example: 2026-01-01 08:00
        type: string
      status:
        example: 0
        type: integer
      status_text:
        example: 待审核
        type: string
    type: object
  internal_reservation.SubmitReq:
    properties:
      alumni_association:
        example: 土木与交通工程学院校友会
        type: string
      applicant_name:
        example: 张三
        type: string
      major:
        example: 建筑系
        type: string
      phone:
        example: "13800138000"
        type: string
      reason:
        example: 智慧城市讲座
        maxLength: 500
        type: string
      slots:
        description: 预约时间段列表（1~4个）
        items:
          $ref: '#/definitions/internal_reservation.TimeSlotReq'
        maxItems: 4
        minItems: 1
        type: array
      year:
        example: 2000
        type: integer
    required:
    - alumni_association
    - applicant_name
    - major
    - phone
    - reason
    - slots
    - year
    type: object
  internal_reservation.TimeSlotReq:
    properties:
      end_time:
        description: 结束时间
        example: "2026-01-01 10:00:00"
        type: string
      start_time:
        description: 开始时间
        example: "2026-01-01 08:00:00"
        type: string
    required:
    - end_time
    - start_time
    type: object
  internal_reservation.TimeSlotResp:
    properties:
      end_time:
        example: 2026-01-01 11:00
        type: string
      start_time:
        example: 2026-01-01 09:00
        type: string
      status:
        description: pending待审核 / approved已通过
        example: pending
        type: string
    type: object
host: localhost:8081
info:
  contact: {}
  description: 校友场地预约系统的后端API服务
  title: 预约系统 API
  version: "2.0"
paths:
  /reservation/{id}:
    delete:
      description: 取消指定的预约订单（取消所有关联的时段），仅预约人本人可操作，需要JWT认证
      parameters:
      - default: Bearer
        description: Bearer JWT令牌
        in: header
        name: Authorization
        required: true
        type: string
      - description: 订单ID
        example: 1
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 取消成功
          schema:
            $ref: '#/definitions/internal_reservation.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/internal_reservation.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/internal_reservation.Response'
      security:
      - BearerAuth: []
      summary: 取消预约
      tags:
      - 预约管理
  /reservation/my:
    get:
      description: 获取当前登录用户的所有预约订单（包含各时段明细），需要JWT认证
      parameters:
      - default: Bearer
        description: Bearer JWT令牌
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            allOf:
            - $ref: '#/definitions/internal_reservation.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/internal_reservation.OrderResp'
                  type: array
              type: object
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/internal_reservation.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/internal_reservation.Response'
      security:
      - BearerAuth: []
      summary: 获取我的预约列表
      tags:
      - 预约管理
  /reservation/occupied:
    get:
      description: 查询指定日期已被预约占用的时间段，需要JWT认证
      parameters:
      - default: Bearer
        description: Bearer JWT令牌
        in: header
        name: Authorization
        required: true
        type: string
      - description: '查询日期(格式: 2026-01-01)'
        example: "2026-01-01"
        in: query
        name: date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            allOf:
            - $ref: '#/definitions/internal_reservation.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/internal_reservation.TimeSlotResp'
                  type: array
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/internal_reservation.Response'
      security:
      - BearerAuth: []
      summary: 获取已占用时间段
      tags:
      - 预约管理
  /reservation/submit:
    post:
      consumes:
      - application/json
      description: 用户提交场地预约申请，支持一次提交1~4个时间段，需要JWT认证
      parameters:
      - default: Bearer
        description: Bearer JWT令牌
        in: header
        name: Authorization
        required: true
        type: string
      - description: 预约提交请求（含多个时间段）
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_reservation.SubmitReq'
      produces:
      - application/json
      responses:
        "200":
          description: 预约申请提交成功
          schema:
            allOf:
            - $ref: '#/definitions/internal_reservation.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_reservation.OrderResp'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/internal_reservation.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/internal_reservation.Response'
      security:
      - BearerAuth: []
      summary: 提交预约申请（支持多时段）
      tags:
      - 预约管理
securityDefinitions:
  BearerAuth:
    description: 'JWT Bearer令牌认证，格式: Bearer token'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
