name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run unit tests
        run: go test $(go list ./... | grep -v '/tests/integration') -v -count=1 -race -timeout=5m -coverprofile=coverage.out

      - name: Go vet
        run: go vet ./...

      - name: Build check
        run: |
          go build ./service/gateway/cmd/
          go build ./service/reservation/cmd/
          go build ./service/admin/cmd/
          go build ./service/swagger/cmd/