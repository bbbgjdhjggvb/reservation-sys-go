name: Test

on:
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run unit tests
        run: go test $(go list ./... | grep -v '/tests/integration') -v -count=1 -coverprofile=coverage.out

      - name: Build check
        run: |
          go build ./service/gateway/cmd/
          go build ./service/reservation/cmd/
          go build ./service/admin/cmd/