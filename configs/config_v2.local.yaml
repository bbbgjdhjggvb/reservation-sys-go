# 预约服务配置 (v2) - 本地开发环境
# 用途: 处理用户预约相关业务
# 使用环境: docker-compose.local.yaml / scripts/env.sh (go run 直连调试)

server:
  port: ":8081"
  mode: "debug"
  cors_allow_origins:       # 本地开发：宽松策略
    - "*"

mysql:
  host: "localhost"         # go run 直连用 localhost + 映射端口 3307；Docker 内运行改为 "mysql"
  port: 3307                # 宿主机映射端口（Docker 内运行改为 3306）
  user: "res_user"
  password: "12345678"
  dbname: "home_xy"
  max_idle_conns: 10
  max_open_conns: 100

redis:
  host: "redis"             # Docker 服务名（容器内）或 localhost（直连映射端口 6380）
  port: 6379
  password: ""
  db: 0

jwt:
  secret: "Y6Xoo746BoVCWFyFUVSqqboCfqo7QkC8A5CN7F9sOm0="
  expire_time: 24

wechat:
  app_id: ""
  app_secret: ""
  token: ""
