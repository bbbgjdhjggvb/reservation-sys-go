# 本地开发 Docker Compose 配置
# 使用方法: docker-compose -f docker-compose.local.yaml up --build
#
# 架构说明:
#   - Gateway: 管理账号数据库(home_xy)，提供 gRPC 通知+账号验证服务
#   - Reservation: 面向用户的预约 HTTP 服务，使用共享预约数据库(home_res)
#   - Admin: 管理员审核 HTTP 服务，使用共享预约数据库(home_res)，通过 gRPC 调用 Gateway

services:
  # ============ 基础设施 ============

  mysql:
    image: mysql:8.0
    container_name: reservation-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./deploy/mysql/init.test.sql:/docker-entrypoint-initdb.d/02_init_test.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --init-connect='SET NAMES utf8mb4'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reservation-net

  redis:
    image: redis:7-alpine
    container_name: reservation-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reservation-net

  # ============ 应用服务 ============

  # Gateway - 微信服务 + gRPC 服务（通知 + 账号验证）
  # 数据库: home_xy（users, admins）
  gateway:
    image: ${GATEWAY_IMAGE:-reservation-gateway:latest}
    container_name: reservation-gateway
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - TZ=Asia/Shanghai
      - CONFIG_PATH=service/gateway/configs/config_v1.local.yaml
    volumes:
      - ./service/gateway/configs:/app/service/gateway/configs:ro
    networks:
      - reservation-net

  # Reservation - 预约服务（HTTP only，无 gRPC）
  # 数据库: home_res（reservation_orders, reservation_slots, review_records）
  reservation:
    image: ${RESERVATION_IMAGE:-reservation-reservation:latest}
    container_name: reservation-reservation
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - TZ=Asia/Shanghai
      - CONFIG_PATH=service/reservation/configs/config_v2.local.yaml
    volumes:
      - ./service/reservation/configs:/app/service/reservation/configs:ro
      - ./service/reservation/frontend:/app/service/reservation/frontend:ro
    networks:
      - reservation-net

  # Admin - 管理员审核服务（HTTP + gRPC Client）
  # 数据库: home_res（通过 pkg/reservationdb 共享）
  # gRPC: 仅调用 Gateway（通知 + 账号验证）
  admin:
    image: ${ADMIN_IMAGE:-reservation-admin:latest}
    container_name: reservation-admin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      gateway:
        condition: service_started
    environment:
      - TZ=Asia/Shanghai
      - CONFIG_PATH=service/admin/configs/config_v3.yaml
    volumes:
      - ./service/admin/configs:/app/service/admin/configs:ro
      - ./service/admin/frontend:/app/service/admin/frontend:ro
    networks:
      - reservation-net

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: reservation-nginx
    restart: unless-stopped
    depends_on:
      - gateway
      - reservation
      - admin
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.config:/etc/nginx/nginx.conf:ro
      - ./dist/reservation/:/usr/share/nginx/html/reservation/:ro
      - ./dist/admin/:/usr/share/nginx/html/admin/:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    networks:
      - reservation-net

networks:
  reservation-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
