<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#CE1A20">
    <meta name="format-detection" content="telephone=no">
    <title>我的预约 - 场地预约系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header id="appHeader" class="bg-white shadow-sm border-b sticky top-0 z-40">
        <div class="max-w-4xl mx-auto px-4 py-4 flex items-center">
            <h1 class="text-xl font-semibold text-gray-800">我的预约</h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-6">
        <!-- Token Error Alert -->
        <div id="tokenError" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
            <p class="font-medium">未授权访问</p>
            <p class="text-sm mt-1">请从微信服务号进入预约页面，或携带 token 参数访问</p>
        </div>

        <!-- Orders Panel -->
        <div id="ordersPanel" class="bg-white rounded-lg shadow">
            <!-- Toolbar -->
            <div class="p-4 sm:p-6 border-b flex items-center justify-between">
                <h2 class="text-base font-semibold text-gray-800">预约记录</h2>
                <button onclick="loadMyOrders()" id="refreshOrdersBtn"
                    class="text-sm text-gray-500 hover:text-gray-700 flex items-center gap-1 transition">
                    <svg id="refreshIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    刷新
                </button>
            </div>

            <!-- Orders List -->
            <div id="ordersList" class="p-4 sm:p-6">
                <!-- Loading skeleton -->
                <div id="ordersLoading" class="hidden space-y-4">
                    <div class="animate-pulse bg-gray-100 rounded-lg h-40"></div>
                    <div class="animate-pulse bg-gray-100 rounded-lg h-40"></div>
                </div>
                <!-- Empty state -->
                <div id="ordersEmpty" class="hidden text-center py-12">
                    <svg class="mx-auto w-16 h-16 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    <p class="mt-3 text-sm text-gray-500">暂无预约记录</p>
                </div>
                <!-- Order cards will be injected here -->
                <div id="ordersContainer"></div>
            </div>
        </div>
    </main>

    <!-- Cancel Confirm Modal -->
    <div id="cancelModal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
        <div class="absolute inset-0 bg-black bg-opacity-50" onclick="closeCancelModal()"></div>
        <div class="relative bg-white rounded-xl shadow-2xl mx-4 max-w-md w-full p-6 animate-modal-in">
            <div class="text-center mb-5">
                <div class="mx-auto w-12 h-12 rounded-full flex items-center justify-center mb-3" style="background:#FEF2F2">
                    <svg class="w-6 h-6" style="color:var(--danger-color)" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
                    </svg>
                </div>
                <h3 class="text-lg font-semibold text-gray-900">确认取消预约？</h3>
                <p class="text-sm text-gray-500 mt-2">取消后需要重新预约该时段</p>
            </div>
            <div id="cancelOrderInfo" class="bg-gray-50 rounded-lg p-4 text-sm mb-5"></div>
            <div class="flex gap-3">
                <button onclick="closeCancelModal()"
                    class="flex-1 py-2.5 px-4 border border-gray-300 rounded-lg text-gray-700 font-medium hover:bg-gray-50 transition">暂不取消</button>
                <button onclick="doCancel()" id="confirmCancelBtn"
                    class="flex-1 py-2.5 px-4 rounded-lg font-medium transition flex items-center justify-center"
                    style="background:var(--danger-color);color:white"
                    onmouseover="this.style.background='#dc2626'"
                    onmouseout="this.style.background='var(--danger-color)'">
                    <span id="confirmCancelText">确认取消</span>
                    <svg id="confirmCancelSpinner" class="hidden animate-spin ml-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast" class="fixed top-4 right-4 z-50 hidden">
        <div class="px-4 py-3 rounded-lg shadow-lg" id="toastContent"></div>
    </div>

    <script src="/static/js/myorders.js"></script>
</body>
</html>
