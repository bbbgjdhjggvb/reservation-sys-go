<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>场地预约管理系统 - 管理员登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --szu-red: #CE1A20;
            --szu-red-dark: #A51519;
            --szu-bg: #FDF6F6;
        }
        body {
            background-color: var(--szu-bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .btn-primary {
            background-color: var(--szu-red);
            color: white;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            background-color: var(--szu-red-dark);
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(206, 26, 32, 0.08);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="card w-full max-w-md p-8">
        <!-- Logo区域 -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full mb-4" style="background-color: var(--szu-red);">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
            </div>
            <h1 class="text-xl font-bold text-gray-800">场地预约管理系统</h1>
            <p class="text-sm text-gray-500 mt-1">管理员审核后台</p>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">账号</label>
                <input type="text" id="username" name="username" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-red-400 focus:ring-2 focus:ring-red-100 outline-none transition"
                    placeholder="请输入管理员账号" autocomplete="username">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-red-400 focus:ring-2 focus:ring-red-100 outline-none transition"
                    placeholder="请输入密码" autocomplete="current-password">
            </div>

            <div id="errorMsg" class="hidden text-sm text-red-600 bg-red-50 p-3 rounded-lg text-center"></div>

            <button type="submit" id="submitBtn"
                class="btn-primary w-full py-3 rounded-lg font-semibold text-base shadow-md">
                登 录
            </button>
        </form>

        <p class="text-xs text-gray-400 text-center mt-6">深圳大学校友场地预约系统 &copy; 2026</p>
    </div>

    <script>
        const API_BASE = '/api/v3';
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('请输入账号和密码');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '登录中...';

            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (!res.ok || data.code !== 200) {
                    showError(data.msg || '登录失败，请检查账号和密码');
                    return;
                }

                // 存储token和管理员信息
                localStorage.setItem('admin_token', data.data.token);
                localStorage.setItem('admin_info', JSON.stringify({
                    username: data.data.username,
                    real_name: data.data.real_name,
                    role: data.data.role,
                    role_text: data.data.role_text
                }));

                // 跳转到审核页面
                window.location.href = '/admin/dashboard';

            } catch (err) {
                showError('网络错误，请稍后重试');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '登 录';
            }
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }

        // 检查是否已登录
        if (localStorage.getItem('admin_token')) {
            window.location.href = '/admin/dashboard';
        }
    </script>
</body>
</html>
