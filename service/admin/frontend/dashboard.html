<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>场地预约管理系统 - 审核中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --szu-red: #CE1A20;
            --szu-red-light: #FDE8EA;
            --szu-red-dark: #A51519;
            --szu-bg: #F5F5F5;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--szu-bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .btn-primary { background-color: var(--szu-red); color: white; transition: all .2s; }
        .btn-primary:hover { background-color: var(--szu-red-dark); }
        .btn-outline { border: 1px solid var(--szu-red); color: var(--szu-red); background: white; transition: all .2s; }
        .btn-outline:hover { background-color: var(--szu-red-light); }
        .btn-success { background-color: #10B981; color: white; }
        .btn-danger { background-color: #EF4444; color: white; }
        .btn-sm { padding: 4px 12px; font-size: 13px; border-radius: 6px; cursor: pointer; }

        .status-pending-l1 { background-color: #FEF3C7; color: #D97706; }
        .status-pending-l2 { background-color: #DBEAFE; color: #2563EB; }
        .status-approved { background-color: #D1FAE5; color: #059669; }
        .status-rejected { background-color: #FEE2E2; color: #DC2626; }
        .status-completed { background-color: #E5E7EB; color: #6B7280; }

        .card { background: white; border-radius: 12px; box-shadow: 0 1px 8px rgba(0,0,0,.06); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 50; }
        .modal-content { background: white; border-radius: 16px; width: 90%; max-width: 520px; max-height: 85vh; overflow-y: auto; padding: 24px; }

        .tab-active { color: var(--szu-red); border-bottom: 2px solid var(--szu-red); font-weight: 600; }
        .tab-inactive { color: #9CA3AF; border-bottom: 2px solid transparent; }
        .tab-inactive:hover { color: var(--szu-red); }

        .order-card { border: 1px solid #F0F0F0; border-radius: 10px; transition: all .2s; cursor: pointer; }
        .order-card:hover { border-color: var(--szu-red); box-shadow: 0 2px 12px rgba(206,26,32,.1); }
        .order-card.active { border-color: var(--szu-red); background-color: var(--szu-red-light); }

        .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }

        /* Toast */
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 10px 24px; border-radius: 8px; color: white; font-size: 14px; z-index: 100; animation: slideDown .3s ease; }
        @keyframes slideDown { from { opacity: 0; top: 0 } to { opacity: 1; top: 20px } }
    </style>
</head>
<body class="min-h-screen">
    <!-- 顶部导航 -->
    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:var(--szu-red)">
                    <span class="text-white text-sm font-bold">审</span>
                </div>
                <h1 class="text-lg font-bold text-gray-800">预约审核中心</h1>
            </div>
            <div class="flex items-center gap-3">
                <span id="adminInfo" class="text-sm text-gray-500"></span>
                <button onclick="logout()" class="text-sm text-gray-400 hover:text-red-600 transition">退出</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-5">
        <!-- Tab 切换（根据角色动态渲染） -->
        <div class="bg-white rounded-t-xl border-b border-gray-100">
            <div class="flex gap-0" id="tabs"></div>
        </div>

        <!-- 订单列表 -->
        <div class="mt-4 space-y-3" id="orderList">
            <div class="text-center py-12 text-gray-400">
                <p>加载中...</p>
            </div>
        </div>

        <!-- 分页 -->
        <div id="pagination" class="flex justify-center gap-2 mt-6"></div>
    </main>

    <!-- 订单详情弹窗 -->
    <div id="detailModal" class="modal-overlay hidden" onclick="if(event.target===this)closeDetail()">
        <div class="modal-content">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold">订单详情</h2>
                <button onclick="closeDetail()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <div id="detailBody"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v3';
        let currentStatus = -1;
        let currentPage = 1;
        let adminRole = 0;

        function getAuthHeaders() {
            return { 'Authorization': 'Bearer ' + localStorage.getItem('admin_token'), 'Content-Type': 'application/json' };
        }

        async function api(url, options = {}) {
            options.headers = { ...getAuthHeaders(), ...(options.headers || {}) };
            const res = await fetch(API_BASE + url, options);
            if (res.status === 401) { logout(); return null; }
            return res.json();
        }

        // ====== Tab配置（按角色） ======
        const tabConfig = {
            1: [ // 一级管理员
                { label: '全部', status: -1 },
                { label: '待一级审核', status: 0 },
                { label: '已通过', status: 1 },
                { label: '已驳回', status: '6,7' },
            ],
            2: [ // 二级管理员
                { label: '全部', status: -1 },
                { label: '待二级审核', status: 5 },
                { label: '已通过', status: 1 },
                { label: '已驳回', status: '6,7' },
            ]
        };

        function renderTabs() {
            const tabs = tabConfig[adminRole] || tabConfig[1];
            const container = document.getElementById('tabs');
            container.innerHTML = tabs.map((t, i) =>
                `<button class="tab-btn ${i === 0 ? 'tab-active' : 'tab-inactive'} px-6 py-3 text-sm" data-status="${t.status}" onclick="switchTab(this)">${t.label}</button>`
            ).join('');
        }

        // ====== 初始化 ======
        async function init() {
            const token = localStorage.getItem('admin_token');
            if (!token) { location.href = '/admin'; return; }

            const infoRes = await api('/admin/info');
            if (!infoRes || infoRes.code !== 200) { logout(); return; }

            adminRole = infoRes.data.role;
            const roleText = infoRes.data.role_text;
            document.getElementById('adminInfo').textContent = `${roleText} · ${infoRes.data.username}`;

            renderTabs();
            loadOrders();
        }

        // ====== Tab切换 ======
        function switchTab(el) {
            document.querySelectorAll('.tab-btn').forEach(b => b.className = 'tab-btn tab-inactive px-6 py-3 text-sm');
            el.className = 'tab-btn tab-active px-6 py-3 text-sm';
            const raw = el.dataset.status;
            currentStatus = raw.includes(',') ? raw : parseInt(raw);
            currentPage = 1;
            loadOrders();
        }

        // ====== 加载订单列表 ======
        async function loadOrders() {
            const container = document.getElementById('orderList');
            container.innerHTML = '<div class="text-center py-12 text-gray-400"><p>加载中...</p></div>';

            const params = new URLSearchParams({ page: currentPage, page_size: 20 });
            if (currentStatus !== -1) {
                // 支持多状态筛选（如 "6,7" 表示一级驳回+二级驳回）
                String(currentStatus).split(',').forEach(s => params.append('status', s.trim()));
            }

            const res = await api('/orders?' + params.toString());
            if (!res) return;
            if (res.code !== 200) { toast(res.msg || '加载失败'); return; }

            const { list, total } = res.data;
            if (!list || list.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-gray-400"><p>暂无数据</p></div>`;
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            container.innerHTML = list.map(order => renderOrderCard(order)).join('');
            renderPagination(total, currentPage, 20);
        }

        // ====== 渲染订单卡片 ======
        function renderOrderCard(o) {
            const statusClass = statusStyleClass(o.status);
            const timeStr = o.slots ? o.slots.map(s => `${s.start_time}~${s.end_time}`).join('<br>') : '-';
            const canReviewL1 = (o.status === 0 && adminRole === 1);
            const canReviewL2 = (o.status === 5 && adminRole === 2);
            const hasPassword = o.slots && o.slots.some(s => s.password);
            const canNotify = (o.status === 1 && adminRole === 1 && hasPassword);

            return `
            <div class="order-card card p-4" onclick="showDetail(${o.id})">
                <div class="flex items-start justify-between">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="font-semibold text-gray-800">${o.applicant_name}</span>
                            <span class="badge ${statusClass}">${o.status_text}</span>
                        </div>
                        <div class="text-sm text-gray-500">${o.alumni_association} · ${o.year}级 · ${o.major}</div>
                        <div class="text-sm text-gray-600 mt-1">${timeStr}</div>
                        <div class="text-xs text-gray-400 mt-1">订单号: ${o.order_no}</div>
                    </div>
                    ${canReviewL1 ? `
                        <div class="flex flex-col gap-1 ml-3" onclick="event.stopPropagation()">
                            <button class="btn-sm btn-success" onclick="doReview(${o.id},1,'通过')">通过</button>
                            <button class="btn-sm btn-danger" onclick="doReview(${o.id},2,'拒绝')">拒绝</button>
                        </div>` : ''}
                    ${canReviewL2 ? `
                        <div class="flex flex-col gap-1 ml-3" onclick="event.stopPropagation()">
                            <button class="btn-sm btn-success" onclick="doReview(${o.id},1,'通过')">通过</button>
                            <button class="btn-sm btn-danger" onclick="doReview(${o.id},2,'拒绝')">拒绝</button>
                        </div>` : ''}
                    ${canNotify ? `
                        <button class="btn-sm btn-primary ml-3" onclick="event.stopPropagation();doNotify(${o.id})">通知用户</button>` : ''}
                </div>
            </div>`;
        }

        // ====== 状态样式映射 ======
        function statusStyleClass(status) {
            const map = { 0:'status-pending-l1', 5:'status-pending-l2', 1:'status-approved', 6:'status-rejected', 7:'status-rejected', 3:'status-completed', 4:'status-completed' };
            return map[status] || 'status-pending-l1';
        }

        // ====== 分页 ======
        function renderPagination(total, page, size) {
            const totalPages = Math.ceil(total / size);
            if (totalPages <= 1) { document.getElementById('pagination').innerHTML=''; return; }
            let html = '';
            if (page > 1) {
                html += `<button class="btn-sm btn-outline" onclick="goPage(${page-1})">上一页</button>`;
            }
            html += `<span class="text-sm text-gray-500 px-3">${page}/${totalPages}</span>`;
            if (page < totalPages) {
                html += `<button class="btn-sm btn-outline" onclick="goPage(${page+1})">下一页</button>`;
            }
            document.getElementById('pagination').innerHTML = html;
        }

        function goPage(p) {
            currentPage = p;
            loadOrders();
        }

        // ====== 订单详情弹窗 ======
        async function showDetail(id) {
            const res = await api(`/orders/${id}`);
            if (!res) return;
            if (res.code !== 200) { toast('获取详情失败'); return; }

            const o = res.data.order;
            const records = res.data.review_records || [];
            const slotHtml = (o.slots||[]).map(s => `
                <tr>
                    <td class="py-2 text-sm">${s.start_time} ~ ${s.end_time}</td>
                    <td class="py-2"><span class="badge ${statusStyleClass(s.status)}">${s.status_text}</span></td>
                    <td class="py-2 text-sm">${s.password || '-'}</td>
                </tr>`).join('');

            const recordHtml = records.map(r => `
                <div class="border-b border-gray-100 pb-2 mb-2">
                    <div class="flex items-center gap-2 text-sm">
                        <span class="font-medium">${r.reviewer_name}</span>
                        <span class="text-xs text-gray-400">${r.role_text}</span>
                        <span class="badge ${r.action===1?'status-approved':'status-rejected'}">${r.action_text}</span>
                        <span class="text-xs text-gray-400 ml-auto">${r.created_at}</span>
                    </div>
                    ${r.comment ? `<p class="text-sm text-gray-500 mt-1">${r.comment}</p>` : ''}
                </div>`).join('') || '<p class="text-gray-400 text-sm">暂无审核记录</p>';

            const hasPwd = o.slots && o.slots.some(s => s.password);
            const canNotifyInDetail = (o.status===1 && adminRole===1 && hasPwd);

            document.getElementById('detailBody').innerHTML = `
                <div class="space-y-4">
                    <div><span class="text-gray-400 text-sm">订单号:</span><span class="ml-2 font-mono text-sm">${o.order_no}</span></div>
                    <div><span class="text-gray-400 text-sm">申请人:</span><span class="ml-2 font-medium">${o.applicant_name}</span></div>
                    <div><span class="text-gray-400 text-sm">学院:</span><span class="ml-2">${o.alumni_association}</span></div>
                    <div><span class="text-gray-400 text-sm">年级/专业:</span><span class="ml-2">${o.year}级 / ${o.major}</span></div>
                    <div><span class="text-gray-400 text-sm">电话:</span><span class="ml-2">${o.phone}</span></div>
                    <div><span class="text-gray-400 text-sm">会议内容:</span><p class="mt-1 text-sm text-gray-600 bg-gray-50 p-2 rounded">${o.reason}</p></div>
                    <div><span class="text-gray-400 text-sm">状态:</span><span class="ml-2 badge ${statusStyleClass(o.status)}">${o.status_text}</span></div>
                    <div>
                        <p class="text-sm text-gray-400 mb-2">时段明细:</p>
                        <table class="w-full text-left">
                            <thead><tr class="text-gray-400 text-xs"><th class="pb-1">时间</th><th class="pb-1">状态</th><th class="pb-1">门锁密码</th></tr></thead>
                            <tbody>${slotHtml}</tbody>
                        </table>
                    </div>
                    ${(o.status===1 && adminRole===1) ? renderPasswordForm(o) : ''}
                    ${canNotifyInDetail ? `<button class="btn-sm btn-primary mt-2" onclick="doNotify(${o.id})">通知用户</button>` : ''}
                    <div>
                        <p class="text-sm text-gray-400 mb-2">审核记录:</p>
                        ${recordHtml}
                    </div>
                </div>`;
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeDetail() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        // ====== 密码设置表单（仅一级管理员+已通过状态） ======
        function renderPasswordForm(o) {
            return `
            <div class="bg-blue-50 p-3 rounded-lg mt-2">
                <p class="text-sm font-medium text-blue-700 mb-2">设置门锁密码：</p>
                ${(o.slots||[]).map(s => `
                    <div class="flex items-center gap-2 mb-2">
                        <span class="text-xs text-gray-500 w-36">${s.start_time}~${s.end_time}</span>
                        <input type="text" id="pwd_${s.id}" placeholder="输入密码" maxlength="20"
                               class="flex-1 text-sm px-2 py-1 border rounded focus:border-red-400 outline-none"
                               value="${s.password||''}">
                        <button class="btn-sm btn-primary" onclick="setPassword(${o.id},${s.id})">保存</button>
                    </div>`).join('')}
            </div>`;
        }

        // ====== 审核操作 ======
        async function doReview(orderId, action, actionLabel) {
            if(!confirm(`确认${actionLabel}此预约申请？`)) return;
            const comment = prompt(`请输入${actionLabel}意见（可选）：`, '') || '';

            const url = adminRole === 1 ? `/review/level1/${orderId}` : `/review/level2/${orderId}`;
            const res = await api(url, { method: 'POST', body: JSON.stringify({ action, comment }) });
            if (!res) return;
            toast(res.code === 200 ? `操作成功：${res.msg}` : (res.msg || '操作失败'));
            loadOrders();
        }

        // ====== 设置门锁密码 ======
        async function setPassword(orderId, slotId) {
            const pwdInput = document.getElementById(`pwd_${slotId}`);
            if(!pwdInput) return;
            const password = pwdInput.value.trim();
            if(!password) { toast('请输入密码'); return; }

            const res = await api(`/review/level1/${orderId}/slots/${slotId}/password`, {
                method: 'PUT',
                body: JSON.stringify({ password })
            });
            if (!res) return;
            if(res.code===200){toast('密码保存成功');showDetail(orderId);}
            else{toast(res.msg||'保存失败');}
        }

        // ====== 发送通知 ======
        async function doNotify(orderId) {
            if(!confirm('确认发送通知给预约用户？')) return;
            const res = await api(`/review/level1/${orderId}/notify`, { method: 'POST' });
            if(!res)return;
            toast(res.code===200?`通知发送成功:${res.msg}`:(res.msg||'发送失败'));
            loadOrders();
        }

        // ====== Toast提示 ======
        let toastTimer;
        function toast(msg, isError=false){
            clearTimeout(toastTimer);
            let el=document.getElementById('toastEl');
            if(!el){
                el=document.createElement('div');
                el.id='toastEl';el.className='toast';
                document.body.appendChild(el);
            }
            el.style.backgroundColor=isError?'#EF4444':'#CE1A20';
            el.textContent=msg;
            el.style.display='block';
            toastTimer=setTimeout(()=>{el.style.display='none'},2500);
        }

        // ====== 退出登录 ======
        function logout(){
            localStorage.removeItem('admin_token');
            localStorage.removeItem('admin_info');
            location.href='/admin';
        }

        init();
    </script>
</body>
</html>
