# /root/workspace/reservation_sys_go/docker-compose.yaml

version: '3.8'

services:
  # ==================== 基础设施 ====================

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: reservation-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_DATABASE: home_xy
      MYSQL_USER: res_user
      MYSQL_PASSWORD: 12345678
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - reservation-net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: reservation-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - reservation-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== 应用服务 ====================

  # v1 - 微信服务
  v1-service:
    image: reservation-sys:latest
    container_name: reservation-v1
    restart: unless-stopped
    command: [ "/app/v1" ]
    ports:
      - "8080:8080"
    volumes:
      - ./configs:/app/configs:ro
    environment:
      - GIN_MODE=debug
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - reservation-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # v2 - 预约服务
  v2-service:
    image: reservation-sys:latest
    container_name: reservation-v2
    restart: unless-stopped
    command: [ "/app/v2" ]
    ports:
      - "8081:8081"
    volumes:
      - ./configs:/app/configs:ro
      - ./internal/reservation/frontend:/app/internal/reservation/frontend:ro
    environment:
      - GIN_MODE=debug
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - reservation-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8081/" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # v3 - 管理后台服务（预留）
  v3-service:
    image: reservation-sys:latest
    container_name: reservation-v3
    restart: unless-stopped
    command: [ "/app/v3" ]
    ports:
      - "8082:8082"
    volumes:
      - ./configs:/app/configs:ro
    environment:
      - GIN_MODE=debug
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - reservation-net
    profiles:
      - admin # 使用 profiles，默认不启动

  # ==================== 网关 ====================

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: reservation-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - v1-service
      - v2-service
    networks:
      - reservation-net

# ==================== 网络与存储 ====================
networks:
  reservation-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
