# 生产环境 Docker Compose 配置
# 使用方法: docker-compose -f docker-compose.prod.yaml up -d
# 配置热更新: 修改宿主机配置文件后执行 docker-compose restart <service>

services:
  # ============ 基础设施 ============

  mysql:
    image: mysql:8.0
    container_name: reservation-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --init-connect='SET NAMES utf8mb4'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reservation-net

  redis:
    image: redis:7-alpine
    container_name: reservation-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reservation-net

  # ============ 应用服务 ============

  gateway:
    image: ${GATEWAY_IMAGE:-reservation-gateway:latest}
    container_name: reservation-gateway
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - TZ=Asia/Shanghai
      - CONFIG_PATH=service/gateway/configs/config_v1.yaml
    volumes:
      # 挂载配置文件目录，支持在宿主机修改配置后 restart 热更新
      - ./service/gateway/configs:/app/service/gateway/configs:ro
    networks:
      - reservation-net

  reservation:
    image: ${RESERVATION_IMAGE:-reservation-reservation:latest}
    container_name: reservation-reservation
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - TZ=Asia/Shanghai
      - CONFIG_PATH=service/reservation/configs/config_v2.yaml
    volumes:
      # 挂载配置文件目录，支持在宿主机修改配置后 restart 热更新
      - ./service/reservation/configs:/app/service/reservation/configs:ro
    networks:
      - reservation-net

  admin:
    image: ${ADMIN_IMAGE:-reservation-admin:latest}
    container_name: reservation-admin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      gateway:
        condition: service_started
    environment:
      - TZ=Asia/Shanghai
      - CONFIG_PATH=service/admin/configs/config_v3.yaml
    volumes:
      # 挂载配置文件目录，支持在宿主机修改配置后 restart 热更新
      - ./service/admin/configs:/app/service/admin/configs:ro
    networks:
      - reservation-net

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: reservation-nginx
    restart: unless-stopped
    depends_on:
      - gateway
      - reservation
      - admin
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.config:/etc/nginx/nginx.conf:ro
      - ./dist/reservation/:/usr/share/nginx/html/reservation/:ro
      - ./dist/admin/:/usr/share/nginx/html/admin/:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    networks:
      - reservation-net

networks:
  reservation-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
